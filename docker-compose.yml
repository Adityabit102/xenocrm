version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cove-postgres
    environment:
      POSTGRES_USER: cove
      POSTGRES_PASSWORD: cove
      POSTGRES_DB: cove
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cove-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cove -d cove"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cove-redis
    ports:
      - "6379:6379"
    networks:
      - cove-network

volumes:
  postgres_data:
    driver: local

networks:
  cove-network:
    driver: bridge
