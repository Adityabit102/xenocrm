version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xenocrm-postgres
    environment:
      POSTGRES_USER: xenocrm
      POSTGRES_PASSWORD: xenocrm
      POSTGRES_DB: xenocrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xenocrm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xenocrm -d xenocrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xenocrm-redis
    ports:
      - "6379:6379"
    networks:
      - xenocrm-network

volumes:
  postgres_data:
    driver: local

networks:
  xenocrm-network:
    driver: bridge
